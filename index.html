<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home Page</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
</head>

<body>

<header>
    <h1>Home Page</h1>
</header>

<main>
    <p>This is my Home page.</p>
    <p>Group: Chad Vatter</p>

    <!-- XSS-safe demo input -->
    <input type="text" id="homeInput" placeholder="Type something">
    <button onclick="showHome()">Submit</button>

    <p id="homeOutput"></p>
</main>

<script>
function showHome() {
    const input = document.getElementById("homeInput").value;

    // XSS protection
    const safe = DOMPurify.sanitize(input);

    // Safe rendering
    document.getElementById("homeOutput").textContent = safe;
}
</script>

</body>
